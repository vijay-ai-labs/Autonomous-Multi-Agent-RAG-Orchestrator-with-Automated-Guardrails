name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: rag
          POSTGRES_PASSWORD: ragpass
          POSTGRES_DB: rag_db
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      qdrant:
        image: qdrant/qdrant:latest
        ports: ["6333:6333"]

    env:
      POSTGRES_URL: postgresql+asyncpg://rag:ragpass@localhost:5432/rag_db
      QDRANT_URL: http://localhost:6333
      REDIS_URL: redis://localhost:6379/0
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      JWT_SECRET: ci-test-secret-key-minimum-32-chars-long
      APP_ENV: test
      LOG_LEVEL: WARNING
      FAITHFULNESS_THRESHOLD: "0.7"
      EVIDENCE_THRESHOLD: "0.6"
      MAX_CHUNKS_PER_QUERY: "8"
      MAX_FILE_SIZE_MB: "50"
      LANGCHAIN_TRACING_V2: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run Alembic migrations
        run: alembic upgrade head
        working-directory: backend

      - name: Run unit + integration tests
        run: python -m pytest tests/ -v --tb=short -q
        working-directory: backend

      - name: Run adversarial eval suites (no API calls)
        run: python -m eval.runner --skip-ragas --report-file /tmp/eval_report.json
        working-directory: backend

      - name: Upload eval report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-report
          path: /tmp/eval_report.json

  ragas-eval:
    name: RAGAS Eval Gate
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run RAGAS eval (pre-generated dataset)
        run: python -m eval.runner --skip-ragas  # swap to full eval when dataset is regenerated
        working-directory: backend
        # NOTE: Use full eval (remove --skip-ragas) after running regenerate_dataset.py
        # and committing eval_dataset.json with real answers + contexts.
