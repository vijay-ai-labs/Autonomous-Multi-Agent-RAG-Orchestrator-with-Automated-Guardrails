name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check deploy prerequisites
        id: prereqs
        run: |
          if [ -z "$EC2_HOST" ]; then
            echo "EC2_HOST secret not set — skipping deploy (no EC2 instance configured)"
            echo "configured=false" >> $GITHUB_OUTPUT
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}

      - name: Deploy via SSH
        if: steps.prereqs.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/app
            git pull origin main
            docker compose -f infra/docker-compose.yml -f infra/docker-compose.prod.yml pull
            docker compose -f infra/docker-compose.yml -f infra/docker-compose.prod.yml up -d --build
            docker compose -f infra/docker-compose.yml exec -T backend alembic upgrade head
            echo "Deploy complete: $(date)"
