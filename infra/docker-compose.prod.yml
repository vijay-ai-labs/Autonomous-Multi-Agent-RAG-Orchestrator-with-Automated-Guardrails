name: rag-orchestrator-prod

services:
  backend:
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 2
    volumes:
      - uploads:/tmp/rag_uploads
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        # Public URL nginx exposes — browser API calls go to yourdomain.com/api/
        # which nginx routes to backend. Change to your actual domain.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://yourdomain.com/api}
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend

  celery:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A ingestion.worker.celery_app worker --loglevel=info -Q default --concurrency=2
    volumes:
      - uploads:/tmp/rag_uploads
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  uploads:
